<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛博恋人</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; -ms-overflow-style: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at 75% 35%, rgba(255, 180, 200, 0.10) 0%, transparent 45%),
        radial-gradient(circle at 25% 70%, rgba(255, 160, 185, 0.08) 0%, transparent 40%),
        linear-gradient(180deg, #fff5f7 0%, #fdf0f5 55%, #fff5f7 100%);
      color: #5a3a4a;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }
    /* ===== 会话面板：常驻在立绘右侧、聊天框左侧 ===== */
    .session-panel {
      position: absolute;
      top: 16px;
      bottom: 24px;
      right: calc(20px + 46% + 10px);
      width: 155px;
      z-index: 2;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,160,185,0.35);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 6px 30px rgba(255,140,170,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
      transition: width 0.3s cubic-bezier(0.4,0,0.2,1), right 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease;
    }
    /* 折叠状态 */
    .session-panel.collapsed {
      width: 0;
      opacity: 0;
      pointer-events: none;
    }
    /* chat-col 展开过渡 */
    .chat-col {
      transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    /* chat-col 在 session-panel 折叠时扩展宽度 */
    body.session-collapsed .chat-col {
      width: calc(46% + 165px);
    }
    /* 折叠按钮 */
    .session-toggle-btn {
      margin-left: auto;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid rgba(255,160,185,0.5);
      background: rgba(255,200,215,0.3);
      color: #c0607a;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.3s cubic-bezier(0.4,0,0.2,1);
      flex-shrink: 0;
      line-height: 1;
      -webkit-app-region: no-drag;
    }
    .session-toggle-btn:hover {
      background: rgba(255,160,185,0.45);
    }
    body.session-collapsed .session-toggle-btn {
      transform: rotate(180deg);
    }
    /* chat-col 顶部栏：折叠时显示 */
    .chat-col-header {
      display: none;
      align-items: center;
      padding: 8px 14px;
      border-bottom: 1px solid rgba(255,160,185,0.25);
      background: rgba(255,245,248,0.6);
      flex-shrink: 0;
      -webkit-app-region: no-drag;
      gap: 8px;
    }
    body.session-collapsed .chat-col-header {
      display: flex;
    }
    .chat-col-expand-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1px solid rgba(255,160,185,0.5);
      background: rgba(255,200,215,0.35);
      color: #c0607a;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      line-height: 1;
      flex-shrink: 0;
    }
    .chat-col-expand-btn:hover {
      background: rgba(255,160,185,0.45);
    }
    .chat-col-title {
      color: #c0607a;
      font-size: 13px;
      font-weight: 600;
    }
    /* 左下角粉色光晕 */
    .session-panel::before {
      content: '';
      position: absolute;
      bottom: -40px;
      left: -40px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at 30% 70%,
        rgba(255, 160, 185, 0.15) 0%,
        rgba(255, 130, 160, 0.06) 35%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 0;
    }
    .session-panel-header {
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255,160,185,0.25);
      flex-shrink: 0;
    }
    .session-panel-header span {
      color: #c0607a;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .new-chat-btn {
      width: calc(100% - 24px);
      margin: 10px 12px 10px;
      padding: 9px;
      background: linear-gradient(180deg, #FFB7C5 0%, #FF9AAF 100%);
      border: 1px solid #FF9AAF;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 2px 10px rgba(255,140,170,0.25);
      white-space: nowrap;
    }
    .new-chat-btn:hover {
      transform: translateY(-1px);
      border-color: #FF80A0;
      background: linear-gradient(180deg, #FF9AAF 0%, #FF7A9A 100%);
    }
    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
    }

    /* ===== 金色纹理背景层 ===== */
    .texture-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .texture-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.06;
      mix-blend-mode: multiply;
      filter: saturate(0.5) brightness(1.1);
    }
    /* ===== 竹影摇曳层（立绘与纹理之间） ===== */
    .character-texture-bg {
      position: absolute;
      bottom: 0;
      left: -60px;
      width: 480px;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .sway-img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: bottom left;
      transform-origin: bottom left;
      opacity: 0.5;
      mix-blend-mode: multiply;
      /* animation: bambooSway 6s ease-in-out infinite; */
    }
    @keyframes bambooSway {
      0%   { transform: rotate(0deg); }
      25%  { transform: rotate(4deg); }
      50%  { transform: rotate(0deg); }
      75%  { transform: rotate(-3deg); }
      100% { transform: rotate(0deg); }
    }
    /* ===== 花瓣飘落层 ===== */
    .petal-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    #petalCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    /* ===== 立绘：固定在左下角 ===== */
    .character-bg {
      position: absolute;
      bottom: 0;
      left: -30px;
      width: 480px;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    .character-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: bottom left;
      filter: saturate(1.0) brightness(1.0);
    }
    .session-item {
      padding: 10px 12px;
      margin: 4px 0;
      border-radius: 8px;
      color: #a06070;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
      position: relative;
    }
    .session-item:hover {
      background: rgba(255, 160, 185, 0.18);
      color: #c0405a;
    }
    .session-item.active {
      background: linear-gradient(180deg, rgba(255, 183, 197, 0.45) 0%, rgba(255, 154, 175, 0.38) 100%);
      color: #c03050;
      box-shadow: inset 0 0 0 1px rgba(255, 160, 185, 0.5);
    }
    .session-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-item .delete-btn {
      opacity: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: rgba(200, 80, 100, 0.75);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .session-item:hover .delete-btn { opacity: 1; }
    .session-item .delete-btn:hover { background: rgba(220, 60, 80, 1); }
    /* 主内容区 */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    /* 主内容区内部横向分栏：左侧信息栏 + 右侧聊天栏 */
    .main-body {
      flex: 1;
      min-height: 0;
      position: relative;
      z-index: 1;
    }
    /* ===== 左侧：亲密度信息栏，绝对定位在左下角 ===== */
    .left-panel {
      position: absolute;
      bottom: 24px;
      left: 24px;
      width: 200px;
      z-index: 2;
    }
    /* ===== 右侧：聊天框矩形，绝对定位在右侧 ===== */
    .chat-col {
      position: absolute;
      top: 16px;
      right: 20px;
      bottom: 24px;
      width: 46%;
      display: flex;
      flex-direction: column;
      z-index: 2;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,160,185,0.4);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(255,140,170,0.18), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    .header {
      background: rgba(255,245,248,0.85);
      color: #c03050;
      padding: 11px 18px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,160,185,0.3);
      -webkit-app-region: drag;
      user-select: none;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .close-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(255,160,185,0.7);
      background: rgba(255,180,180,0.4);
      color: #c03050;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
      line-height: 1;
    }
    .close-btn:hover {
      background: rgba(220, 80, 100, 0.75);
      border-color: #ff8080;
      color: #fff;
      transform: scale(1.1);
    }
    .diary-link-btn {
      padding: 5px 12px;
      background: rgba(255,183,197,0.35);
      border: 1px solid rgba(255,160,185,0.7);
      border-radius: 15px;
      color: #c03050;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .diary-link-btn:hover { background: rgba(255,160,185,0.5); }
    .header-actions { display: flex; gap: 8px; align-items: center; -webkit-app-region: no-drag; }
    .action-btn {
      width: 32px;
      height: 32px;
      padding: 0;
      background: rgba(255,183,197,0.35);
      border: 1px solid rgba(255,160,185,0.7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover {
      background: rgba(255,160,185,0.5);
      transform: scale(1.08);
    }
    #bgmIcon {
      font-size: 14px;
    }
    /* BGM播放中：紫色背景 + 脉冲动画 */
    #bgmToggleBtn.bgm-playing {
      background: linear-gradient(135deg, #C8A2D4 0%, #9B6FB0 100%) !important;
      border-color: rgba(155,111,176,0.9) !important;
      animation: chatBgmPulse 1.2s ease-in-out infinite;
    }
    @keyframes chatBgmPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(155,111,176,0); transform: scale(1); }
      50% { box-shadow: 0 0 10px 3px rgba(155,111,176,0.35); transform: scale(1.06); }
    }
    .action-btn .btn-icon {
      width: 16px;
      height: 16px;
      background-color: #c03050;
      -webkit-mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-size: contain;
      mask-repeat: no-repeat;
      mask-position: center;
      flex-shrink: 0;
    }
    .theme-icon {
      background-color: transparent !important;
      -webkit-mask-image: none !important;
      mask-image: none !important;
      font-size: 14px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: transparent;
      min-height: 0;
    }
    .message {
      max-width: 78%;
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .message.ai {
      background: rgba(255,255,255,0.88);
      color: #5a3a4a;
      align-self: flex-start;
      border-radius: 18px 18px 18px 4px;
      border: 1px solid rgba(255,160,185,0.45);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 4px 20px rgba(255,140,170,0.12);
    }
    .message.user {
      background:
        radial-gradient(ellipse at 50% 30%,
          rgba(255, 200, 215, 0.5) 0%,
          rgba(255, 160, 185, 0.2) 45%,
          transparent 72%
        ),
        linear-gradient(180deg, #FFB7C5 0%, #FF9AAF 100%);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      border: 1px solid rgba(255, 154, 175, 0.7);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.4),
        0 4px 18px rgba(255,140,170,0.3),
        0 0 12px rgba(255, 160, 185, 0.18);
    }
    .message.loading { opacity: 0.6; font-style: italic; }
    .welcome {
      text-align: center;
      color: #b08090;
      padding: 40px 20px;
    }
    .welcome .emoji { font-size: 48px; margin-bottom: 15px; }
    .mood-area {
      padding: 8px 16px;
      background: rgba(255,245,248,0.7);
      border-top: 1px solid rgba(255,160,185,0.22);
      display: flex;
      align-items: center;
      gap: 15px;
      flex-shrink: 0;
    }
    .mood-area-label { font-size: 12px; color: #c06080; white-space: nowrap; }
    .mood-buttons { display: flex; gap: 10px; }
    .mood-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,160,185,0.6);
      background: rgba(255,255,255,0.8);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mood-btn:hover {
      transform: scale(1.08);
      border-color: #FF9AAF;
      background: rgba(255,183,197,0.5);
    }
    .mood-btn:active { transform: scale(0.95); }
    .mood-toast {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.97);
      color: #c03050;
      padding: 12px 24px;
      border-radius: 20px;
      font-size: 15px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
      border: 1px solid rgba(255,160,185,0.7);
      box-shadow: 0 4px 20px rgba(255,140,170,0.2);
    }
    .mood-toast.show { opacity: 1; }
    .input-area {
      padding: 12px 16px;
      background: rgba(255,245,248,0.7);
      border-top: 1px solid rgba(255,160,185,0.22);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid rgba(255,160,185,0.5);
      border-radius: 25px;
      font-size: 14px;
      outline: none;
      color: #5a3a4a;
      background: rgba(255,255,255,0.85);
    }
    .input-area input::placeholder { color: rgba(192,96,120,0.55); }
    .input-area input:focus {
      border-color: #FF9AAF;
      box-shadow: 0 0 0 2px rgba(255,160,185,0.25);
    }
    .send-btn {
      padding: 12px 20px;
      background: linear-gradient(180deg, #FFB7C5 0%, #FF9AAF 100%);
      border: 1px solid #FF9AAF;
      border-radius: 25px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 2px 10px rgba(255,140,170,0.25);
    }
    .send-btn:hover {
      background: linear-gradient(180deg, #FF9AAF 0%, #FF7A9A 100%);
    }
    .empty-sidebar {
      text-align: center;
      color: #c08090;
      padding: 20px;
      font-size: 12px;
    }
    /* ===== 礼物按钮 ===== */
    .gift-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255,160,185,0.6);
      background: linear-gradient(135deg, #FFB7C5 0%, #FF9AAF 100%);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s;
      flex-shrink: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 3px 10px rgba(255,140,170,0.25);
    }
    .gift-btn:hover {
      transform: scale(1.08);
      border-color: #FF80A0;
      background: linear-gradient(135deg, #FF9AAF 0%, #FF7A9A 100%);
    }
    /* ===== 礼物特效 ===== */
    .gift-effect-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }
    .gift-particle {
      position: absolute;
      font-size: 24px;
      animation: giftFloat 2s ease-out forwards;
      pointer-events: none;
    }
    @keyframes giftFloat {
      0% { transform: translateY(0) scale(0) rotate(0deg); opacity: 1; }
      20% { transform: translateY(-20vh) scale(1.2) rotate(20deg); opacity: 1; }
      100% { transform: translateY(-100vh) scale(0.5) rotate(-20deg); opacity: 0; }
    }
    .gift-burst {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 80px;
      animation: giftBurst 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      z-index: 10000;
      pointer-events: none;
    }
    @keyframes giftBurst {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-15deg); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1.3) rotate(10deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.8) rotate(0deg); opacity: 0; }
    }
    .affection-burst {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      font-weight: bold;
      color: #FF6B9D;
      text-shadow: 0 0 10px rgba(255,107,157,0.5);
      animation: affectionPop 1.5s ease-out forwards;
      z-index: 10001;
      pointer-events: none;
      white-space: nowrap;
    }
    @keyframes affectionPop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      30% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
      100% { transform: translate(-50%, -100%) scale(1); opacity: 0; }
    }
    /* ===== 音乐播放器弹窗 ===== */
    .music-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,200,215,0.35);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .music-modal.show { opacity: 1; pointer-events: auto; }
    .music-modal .modal-content {
      background: linear-gradient(180deg, #fff5f7 0%, #fdf0f5 100%);
      color: #5a3a4a;
      padding: 26px 28px;
      border-radius: 20px;
      width: 420px;
      max-width: 90vw;
      box-shadow: 0 20px 50px rgba(255,140,170,0.25), inset 0 1px 0 rgba(255,255,255,0.9);
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      border: 1px solid rgba(255,160,185,0.5);
    }
    .music-modal.show .modal-content { transform: scale(1); }
    .music-modal .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px;
    }
    .music-modal .modal-header h3 {
      font-size: 16px; margin: 0; color: #c03050;
      display: flex; align-items: center; gap: 8px;
    }
    .music-modal .modal-close {
      background: rgba(255,183,197,0.4);
      border: 1px solid rgba(255,160,185,0.5);
      color: #c06080; font-size: 16px; cursor: pointer;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; transition: all 0.2s;
    }
    .music-modal .modal-close:hover { background: rgba(220,80,100,0.7); border-color: #ff8080; color: #fff; }
    .music-search {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .music-search input {
      flex: 1; padding: 10px 14px;
      border: 1px solid rgba(255,160,185,0.45); border-radius: 20px;

  <!-- 主区域：立绘铺满背景，内部分栏 -->

    <!-- 顶部标题栏（跨越全宽） -->

        <button class="close-btn" onclick="window.close()" title="关闭">✕</button>

        <!-- 礼物选择弹窗 -->
        <div class="gift-modal" id="giftModal">
          <div class="modal-content">
            <div class="modal-header">
              <h3><span style="display:inline-block;width:18px;height:18px;background-color:#c03050;-webkit-mask-image:url('svg/gift.svg');mask-image:url('svg/gift.svg');-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;vertical-align:middle;margin-right:6px"></span>赠送礼物</h3>
              <button class="modal-close" onclick="closeGiftModal()">×</button>
            </div>
            <div class="gift-inventory" id="giftInventory">
              <div class="gift-empty">
                <span class="gift-empty-icon"></span>
                <div>背包是空的</div>
                <div style="font-size: 11px; margin-top: 6px; opacity: 0.7;">去商店买点礼物吧~</div>
              </div>
            </div>
          </div>
        </div>
        <!-- 音频播放器 -->
        <audio id="audioPlayer" preload="none"></audio>
        <div class="chat-container" id="chatContainer">
          <div class="welcome">
            <div class="emoji">👋</div>
            <p style="margin-top: 10px; font-size: 12px;">选择一个会话或新建会话来开始聊天吧~</p>
          </div>
        </div>
        <div class="mood-area">
          <span class="mood-area-label">记录心情：</span>
          <div class="mood-buttons">
            <button class="mood-btn" data-mood="happy" title="开心">😊</button>
            <button class="mood-btn" data-mood="neutral" title="平和">😐</button>
            <button class="mood-btn" data-mood="sad" title="不开心">😭</button>
          </div>
        </div>
        <div class="input-area">
          <button class="gift-btn" onclick="openGiftModal()" title="赠送礼物">
            <span style="display:block;width:20px;height:20px;background-color:white;-webkit-mask-image:url('svg/gift.svg');mask-image:url('svg/gift.svg');-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center"></span>
          </button>
          <input type="text" id="messageInput" placeholder="说点什么...（试试"一起听歌"、"打游戏"）" onkeypress="handleKeyPress(event)">
          <button class="send-btn" onclick="sendMessage()">发送</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== BGM 背景音乐控制（通过IPC与主窗口同步） =====
    const ipcRendererChat = require('electron').ipcRenderer;
    let bgmPlaying = false;
    const bgmIcon = document.getElementById('bgmIcon');

    // 监听主窗口广播的BGM状态变化
    ipcRendererChat.on('bgm-state-sync', (e, playing) => {
      bgmPlaying = playing;
      bgmIcon.textContent = playing ? '🔊' : '🎵';
      const btn = document.getElementById('bgmToggleBtn');
      if (playing) {
        btn.classList.add('bgm-playing');
      } else {
        btn.classList.remove('bgm-playing');
      }
    });

    // 切换BGM - 发送IPC指令给主窗口
    function toggleBGM() {
      ipcRendererChat.send('bgm-toggle');
    }

    // 页面打开时请求当前状态
    setTimeout(() => {
      ipcRendererChat.send('bgm-request-state');
    }, 500);

    // ===== 会话列表折叠/展开 =====
    function toggleSessionPanel() {
      const panel = document.getElementById('sessionPanel');
      const btn = document.getElementById('sessionToggleBtn');
      const isCollapsed = panel.classList.toggle('collapsed');
      document.body.classList.toggle('session-collapsed', isCollapsed);
      btn.classList.toggle('collapsed', isCollapsed);
      btn.title = isCollapsed ? '展开会话列表' : '折叠会话列表';
    }

    // ===== 花瓣飘落动画 =====
    (function() {
      const canvas = document.getElementById('petalCanvas');
      const ctx = canvas.getContext('2d');

      function resize() {
        canvas.width  = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      // 花瓣颜色（粉色 / 黑金模式下换成纯金色）
      const COLORS_PINK = [
        'rgba(255,183,197,', 'rgba(255,160,185,', 'rgba(255,210,220,',
        'rgba(240,140,170,', 'rgba(255,230,235,',
      ];
      const COLORS_GOLD = [
        'rgba(255,215,0,', 'rgba(255,200,0,', 'rgba(255,230,80,',
        'rgba(240,185,0,', 'rgba(255,240,120,',
      ];
      function getPetalColors() {
        return document.body.classList.contains('theme-dark') ? COLORS_GOLD : COLORS_PINK;
      }

      // 单片花瓣
      function makePetal() {
        return {
          x:     Math.random() * canvas.width,
          y:     -20 - Math.random() * 80,
          len:   10 + Math.random() * 14,       // 花瓣长度
          wid:   5  + Math.random() * 6,        // 花瓣宽度
          rot:   Math.random() * Math.PI * 2,   // 自身旋转角
          rotV:  (Math.random() - 0.5) * 0.03,  // 自转速度（慢）
          vy:    0.5 + Math.random() * 0.8,     // 下落速度（慢）
          vx:    (Math.random() - 0.5) * 0.4,  // 横向漂移
          swing: Math.random() * Math.PI * 2,   // 左右摆动相位
          swingA: 0.4 + Math.random() * 0.6,   // 摆动幅度
          swingS: 0.008 + Math.random() * 0.01, // 摆动速度
          colorIdx: Math.floor(Math.random() * 5),
          alpha: 0.55 + Math.random() * 0.35,
        };
      }

      // 初始化：散布在画面各处，不全从顶部开始
      const petals = [];
      const COUNT = 28;
      for (let i = 0; i < COUNT; i++) {
        const p = makePetal();
        p.y = Math.random() * canvas.height; // 初始随机分布
        petals.push(p);
      }

      // 画单片花瓣（椭圆形单瓣，带叶脉）
      function drawPetal(p) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);

        const len = p.len, wid = p.wid;

        // 花瓣轮廓：用贝塞尔画一片椭圆形花瓣
        ctx.beginPath();
        ctx.moveTo(0, -len / 2);
        ctx.bezierCurveTo( wid,  -len * 0.1,   wid,   len * 0.3,  0,  len / 2);
        ctx.bezierCurveTo(-wid,   len * 0.3,  -wid,  -len * 0.1,  0, -len / 2);

        const colors = getPetalColors();
        const c = colors[p.colorIdx % colors.length];
        const grad = ctx.createLinearGradient(0, -len / 2, 0, len / 2);
        grad.addColorStop(0,   c + (p.alpha * 0.7) + ')');
        grad.addColorStop(0.5, c + p.alpha + ')');
        grad.addColorStop(1,   c + (p.alpha * 0.6) + ')');
        ctx.fillStyle = grad;
        ctx.fill();

        // 中脉
        ctx.beginPath();
        ctx.moveTo(0, -len / 2);
        ctx.lineTo(0,  len / 2);
        ctx.strokeStyle = `rgba(255,255,255,${p.alpha * 0.5})`;
        ctx.lineWidth = 0.6;
        ctx.stroke();

        ctx.restore();
      }

      let t = 0;
      function tick() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        t++;
        for (const p of petals) {
          // 左右摆动叠加
          p.x += p.vx + Math.sin(t * p.swingS + p.swing) * p.swingA;
          p.y += p.vy;
          p.rot += p.rotV;

          // 超出底部则重置到顶
          if (p.y > canvas.height + 30) {
            p.x = Math.random() * canvas.width;
            p.y = -20;
          }
          // 超出左右边界折返
          if (p.x < -20) p.x = canvas.width + 20;
          if (p.x > canvas.width + 20) p.x = -20;

          drawPetal(p);
        }
        requestAnimationFrame(tick);
      }
      tick();
    })();

    // 引入养成系统
    const {
      addAffection, getProgression, getCurrentStage, getStageProgress,
      addHiddenAffection, addMemory, getMemory, checkMoodKeywords,
      applyPenalty, getMoodModifier, isReconciling, getReconciliationContext
    } = (function() {
      const PROGRESSION_KEY = 'cyber_progression';
      const STAGES = [
        { id: 1, name: '初识', min: 0, max: 100, color: '#E8E8E8' },
        { id: 2, name: '熟悉', min: 101, max: 300, color: '#B8D4E8' },
        { id: 3, name: '暧昧', min: 301, max: 600, color: '#FFB7C5' },
        { id: 4, name: '交往', min: 601, max: 1000, color: '#FF9AAF' },
        { id: 5, name: '结婚', min: 1001, max: 2000, color: '#FFD700' },
        { id: 6, name: '白头偕老', min: 2001, max: Infinity, color: '#FF69B4' }
      ];
      const ACTIONS = {
        firstChat: { stage: 1, points: 5, msg: '今日初见~', type: 'daily' },
        chat: { stage: 2, points: 10, msg: '和你聊天很开心' },
        nightGreeting: { stage: 3, points: 15, msg: '被惦记着真好' },
        expressMiss: { stage: 3, points: 20, msg: '...我也是' },
        playGame: { stage: 3, points: 25, msg: '和你一起很开心' },
        date: { stage: 4, points: 30, msg: '今天的约会很开心' },
        anniversary: { stage: 4, points: 40, msg: '重要的一天' },
        weddingAnniversary: { stage: 5, points: 50, msg: '又一年了呢' },
        dailyTogether: { stage: 5, points: 15, msg: '平凡的每一天' },
        dailyStay: { stage: 6, points: 10, msg: '有你在真好', type: 'daily' },
        // 二次复合路线专属
        reconcileChat: { stage: 1, points: 3, msg: '谢谢你还在...' },
        reconcileApologize: { stage: 1, points: 8, msg: '我愿意重新认识你' }
      };

      // ========== 关键词惩罚配置 ==========
      // extreme: 直接归零，进入二次复合
      // heavy: 大幅扣分，可能导致阶段回退
      // medium: 中度扣分
      // light: 轻微扣分，仅情感波动
      const MOOD_KEYWORDS = {
        extreme: {
          keywords: ['离婚', '分手', '散了吧', '别联系了', '拉黑', '删除', '结束了', '一刀两断', '再见了', '永别', '不爱你了', '不爱了', '不要再见了', '算了吧', '到此为止', '形同陌路', '各走各的', '我们完了', 'game over'],
          penalty: 0, // 直接归零（第三次确认时）
          aiMsg: '...等等，你认真的吗？能不能再想想？'
        },
        heavy: {
          keywords: ['不想理你', '烦死了', '讨厌你', '滚', '别烦我', '够了', '离我远点', '受够了', '忍够了', '不想和你说话', '别碰我', '不要你了', '后悔认识你', '别出现在我面前'],
          penalty: -80,
          aiMsg: '...好。我安静一点。'
        },
        medium: {
          keywords: ['生气', '不高兴', '不开心', '不爽', '生气了', '你太过分了', '你变了', '失望', '没意思', '心寒', '不在乎我', '不关心我', '冷暴力', '忽视我', '敷衍我'],
          penalty: -30,
          aiMsg: '...对不起。是我哪里做得不好吗？'
        },
        light: {
          keywords: ['哼', '烦', '无聊', '无语', '算了', '不想说', '随便吧', '你猜', '不理你了', '赌气', '小气', '笨蛋', '傻瓜', '讨厌'],
          penalty: -10,
          aiMsg: '...嗯。'
        }
      };

      // ========== 记忆系统 ==========
      function addMemory(key, value) {
        const p = getProgression();
        if (!p.memory) p.memory = [];
        // 同 key 覆盖旧记忆
        p.memory = p.memory.filter(m => m.key !== key);
        p.memory.push({ key, value, timestamp: Date.now() });
        // 最多保留 50 条
        if (p.memory.length > 50) p.memory = p.memory.slice(-50);
        saveProgression(p);
      }

      function getMemory(key) {
        const p = getProgression();
        if (!p.memory) return null;
        return p.memory.find(m => m.key === key) || null;
      }

      // ========== 初始化 / 读写 ==========
      function getProgression() {
        const data = localStorage.getItem(PROGRESSION_KEY);
        if (data) return JSON.parse(data);
        return {
          affection: 0, stage: 1, lastInteraction: Date.now(),
          lastDailyBonus: null, memory: [], stageHistory: [{ stage: 1, date: new Date().toISOString() }],
          breakupCount: 0, breakups: [], isReconciling: false, breakupWarnings: 0
        };
      }

      function saveProgression(p) { localStorage.setItem(PROGRESSION_KEY, JSON.stringify(p)); }

      function getCurrentStage(affection) {
        for (let i = STAGES.length - 1; i >= 0; i--) {
          if (affection >= STAGES[i].min) return STAGES[i];
        }
        return STAGES[0];
      }

      function getStageProgress(affection) {
        const stage = getCurrentStage(affection);
        if (stage.max === Infinity) return Math.min(100, Math.round(((affection - stage.min) / 500) * 100));
        return Math.min(100, Math.max(0, Math.round(((affection - stage.min) / (stage.max - stage.min)) * 100)));
      }

      // ========== 好感度增减 ==========
      function addAffection(action) {
        const cfg = ACTIONS[action];
        if (!cfg) return null;
        const p = getProgression();
        const currentStage = getCurrentStage(p.affection);

        if (cfg.type === 'daily') {
          const today = new Date().toDateString();
          if (p.lastDailyBonus === today) return null;
          p.lastDailyBonus = today;
        }

        // 二次复合期间好感度获取减半
        let points = cfg.points;
        if (p.isReconciling) points = Math.max(1, Math.floor(points * 0.5));

        const oldStage = currentStage.id;
        p.affection = Math.max(0, p.affection + points);
        p.lastInteraction = Date.now();
        const newStage = getCurrentStage(p.affection);
        p.stage = newStage.id;

        // 阶段变更记录
        if (newStage.id !== oldStage) {
          if (!p.stageHistory) p.stageHistory = [];
          p.stageHistory.push({ stage: newStage.id, date: new Date().toISOString() });
        }
        // 检测是否完成复合（重新回到分手前的阶段）
        if (p.isReconciling && p.breakups && p.breakups.length > 0) {
          const lastBreakup = p.breakups[p.breakups.length - 1];
          if (lastBreakup.fromStage && newStage.id >= lastBreakup.fromStage) {
            p.isReconciling = false;
            addMemory('lastReconcile', { date: new Date().toISOString(), fromStage: lastBreakup.fromStage });
          }
        }

        saveProgression(p);
        const stageUp = newStage.id > oldStage;
        const stageDown = newStage.id < oldStage;
        if (stageUp) p.lastStageUp = Date.now();
        return { points, message: cfg.msg, stageUp, stageDown, newStage, oldStageName: STAGES[oldStage - 1].name };
      }

      function addHiddenAffection(points, msg) {
        const p = getProgression();
        p.affection = Math.max(0, p.affection + points);
        p.lastInteraction = Date.now();
        p.stage = getCurrentStage(p.affection).id;
        saveProgression(p);
        return { points, message: msg };
      }

      // ========== 关键词检测 ==========
      // 返回: null | { level, penalty, aiMsg, matchedKeyword, isExtreme }
      function checkMoodKeywords(text) {
        const lower = text.toLowerCase();
        for (const [level, config] of Object.entries(MOOD_KEYWORDS)) {
          for (const kw of config.keywords) {
            if (lower.includes(kw.toLowerCase())) {
              return {
                level,
                penalty: config.penalty,
                aiMsg: config.aiMsg,
                matchedKeyword: kw,
                isExtreme: level === 'extreme'
              };
            }
          }
        }
        return null;
      }

      // 应用惩罚，返回结果
      function applyPenalty(result) {
        const p = getProgression();
        const oldStage = getCurrentStage(p.affection);
        const oldStageId = oldStage.id;

        if (result.isExtreme) {
          // 挽留机制：前两次说分手/离婚时进行挽留，不执行分手
          if (!p.breakupWarnings) p.breakupWarnings = 0;
          
          if (p.breakupWarnings < 2) {
            // 挽留阶段：不归零，只扣部分好感
            p.breakupWarnings++;
            const persuadePenalty = -Math.floor(p.affection * 0.15); // 扣当前好感的15%
            p.affection = Math.max(0, p.affection + persuadePenalty);
            p.lastInteraction = Date.now();
            saveProgression(p);
            
            const newStage = getCurrentStage(p.affection);
            return {
              oldStageName: oldStage.name,
              newStage: newStage,
              newStageName: newStage.name,
              stageDown: newStage.id < oldStageId,
              isExtreme: false,
              penalty: persuadePenalty,
              isPersuading: true, // 标记为挽留状态
              persuadeRound: p.breakupWarnings, // 第几次挽留
              matchedKeyword: result.matchedKeyword
            };
          }
          
          // 第三次确认：执行分手
          // 极端情况：好感度归零，进入二次复合
          if (!p.breakups) p.breakups = [];
          if (!p.breakupCount) p.breakupCount = 0;
          p.breakups.push({
            date: new Date().toISOString(),
            fromStage: oldStageId,
            fromAffection: p.affection,
            trigger: result.matchedKeyword
          });
          p.breakupCount++;
          p.affection = 0;
          p.isReconciling = true;
          p.stage = 1;
          p.breakupWarnings = 0; // 重置挽留计数
          if (!p.stageHistory) p.stageHistory = [];
          p.stageHistory.push({ stage: 1, date: new Date().toISOString(), event: 'breakup', trigger: result.matchedKeyword });
        } else {
          p.affection = Math.max(0, p.affection + result.penalty);
          const newStage = getCurrentStage(p.affection);
          p.stage = newStage.id;
          if (newStage.id < oldStageId) {
            if (!p.stageHistory) p.stageHistory = [];
            p.stageHistory.push({ stage: newStage.id, date: new Date().toISOString(), event: 'stage_down', trigger: result.matchedKeyword });
          }
        }

        p.lastInteraction = Date.now();
        saveProgression(p);

        const newStage = getCurrentStage(p.affection);
        return {
          oldStageName: oldStage.name,
          newStage: newStage,
          newStageName: newStage.name,
          stageDown: newStage.id < oldStageId,
          isExtreme: result.isExtreme,
          penalty: result.isExtreme ? p.affection : result.penalty, // 0 for extreme
          aiMsg: result.aiMsg,
          matchedKeyword: result.matchedKeyword,
          breakupCount: p.breakupCount || 0
        };
      }

      // 二次复合期间的好感度获取倍率（0.5x）
      function getMoodModifier() {
        const p = getProgression();
        return p.isReconciling ? 0.5 : 1.0;
      }

      // 判断是否在二次复合中
      function isReconciling() {
        const p = getProgression();
        return !!p.isReconciling;
      }

      // 获取二次复合上下文（用于注入 AI prompt）
      function getReconciliationContext() {
        const p = getProgression();
        if (!p.isReconciling || !p.breakups || p.breakups.length === 0) return null;
        const last = p.breakups[p.breakups.length - 1];
        const fromStageName = STAGES[last.fromStage - 1] ? STAGES[last.fromStage - 1].name : '未知';
        return {
          breakupDate: last.date,
          fromStage: last.fromStage,
          fromStageName,
          trigger: last.trigger,
          breakupCount: p.breakupCount || 0,
          currentAffection: p.affection
        };
      }

      return {
        addAffection, getProgression, getCurrentStage, getStageProgress,
        addHiddenAffection, addMemory, getMemory, checkMoodKeywords,
        getMoodModifier, isReconciling, getReconciliationContext, applyPenalty
      };
    })();

    // 根据阶段返回不同的 prompt 边界（含二次复合特殊处理）
    function getStagePrompt(stage, aiName) {
      // 二次复合特殊处理
      if (isReconciling()) {
        const ctx = getReconciliationContext();
        const countText = ctx.breakupCount > 1
          ? `（这是你们第${ctx.breakupCount}次分手后的重新接触）`
          : '';
        return `【当前状态：分手后重新接触${countText}】
你和用户曾经非常亲密（${ctx.fromStageName}阶段），但因为"${ctx.trigger}"的原因分手了。
现在用户重新回来找你，你们从陌生人重新开始。
- 称呼用户：回到礼貌称呼，可以叫名字或"你"，偶尔流露出一丝复杂的情绪
- 回复风格：克制、带着淡淡的伤感，但内心还在动摇。不会主动提起过去，但如果用户提起，会沉默或简短回应
- 禁止行为：不能立刻回到亲密状态，不能假装什么都没发生过，不能讨好和卑微
- 情感内核：你还在意，但被伤到了。你需要慢慢确认对方的真心，才愿意重新打开心扉
- 复合进度：当前好感度${ctx.currentAffection}，回到${ctx.fromStageName}阶段才算真正复合`;
      }

      const prompts = {
        1: `【当前阶段：初识】
你和用户刚刚认识，关系处于初始阶段。请保持礼貌但温暖的距离感。
- 称呼用户：直接叫名字或"你"
- 回复风格：简洁克制，保持适当距离
- 禁止行为：不能有亲密称呼、暧昧表达、肢体暗示、过于热情的表达
- 重点：展现礼貌和初步的友好感，让对话自然轻松`,
        
        2: `【当前阶段：熟悉】
你和用户的关系正在加深，开始了解彼此。请展现出愿意深入交流的态度。
- 称呼用户：可以开始用昵称或简称

    function detectIntent(text) {
      // —— 1. 音乐意图检测 ——
      // 先检测是否包含具体歌名（匹配《歌名》或"听XXX"格式）
      const specificSongPatterns = [
        /(?:听|播放|放|想听|来首|我要听|给我放|播)[《『「"']([^《』」"']+)[》』」"']/,
        /(?:听|播放|放|想听|来首|我要听|给我放|播)\s*["']([^"']+)["']/,
        /(?:听|播放|放|想听|来首|我要听|给我放|播)\s+(.+?)(?:\s*$|\s+吧|\s+好吗|\s+吗)/,
      ];
      let songName = null;
      for (const pattern of specificSongPatterns) {
        const match = text.match(pattern);
        if (match && match[1] && match[1].length > 1 && match[1].length < 30) {
          songName = match[1].trim();
          break;
        }
      }

      const musicKeywords = [
        '一起听歌', '一起听音乐', '放首歌', '听首歌', '听首歌吧', '放首歌吧',
        '想听歌', '来首歌', '听歌吗', '听音乐', '听歌', '放音乐', '播放音乐',
        '听点音乐', '来点音乐', '音乐播放', '播放歌', '来点歌', '听个歌',
        '陪我听歌', '一起听', '共享音乐', 'music', '听曲', '来首曲子',
      ];
      const musicPatterns = [
        /想听.{0,4}歌/, /来.{0,2}首.{0,4}歌/, /放.{0,2}首.{0,4}歌/,
        /听.{0,3}音乐/, /播放.{0,4}歌/, /听.{0,2}歌.{0,2}吧/,
      ];
      
      if (songName) {
        return { intent: 'music', songName };
      }
      if (musicKeywords.some(kw => text.includes(kw)) || musicPatterns.some(p => p.test(text))) {
        return { intent: 'music', songName: null };
      }

      // —— 2. 游戏意图检测 ——
      const gameKeywords = [
        '打游戏', '玩游戏', '来一局', '一起玩', '玩一局', '玩游戏吧',
        '来玩游戏', '开一局', '小动物快跑', '跑酷', '闯关',
        '打游戏吧', '陪我玩', '陪我打游戏', '来局游戏', '玩小游戏',
        '玩个游戏', '想玩游戏', '打游戏吗', '来玩吗',
        '开玩', '来玩局', '玩把游戏',
      ];
      // 排除否定语境（如"这个游戏不好玩"、"不想玩游戏"）
      const gameNegPatterns = [
        /不想.{0,4}玩/, /不要.{0,4}玩/, /不玩/, /没.{0,2}游戏/, /游戏不好/,
        /不会.{0,4}玩/, /别.{0,2}玩/,
      ];
      const gamePatterns = [
        /(?:想|要|来|去|快|赶紧|陪我).{0,3}(?:玩|打).{0,3}游戏/,
        /玩.{0,3}游戏/, /打.{0,3}游戏/, /来.{0,3}局/,
        /一起.{0,3}玩/, /陪.{0,2}玩/, /开.{0,3}局/,
      ];

      const isGameNegated = gameNegPatterns.some(p => p.test(text));
      if (!isGameNegated && (gameKeywords.some(kw => text.includes(kw)) || gamePatterns.some(p => p.test(text)))) {
        return { intent: 'game' };
      }

      return { intent: 'unknown' };
    }

            autoPlaySong(intentResult.songName);
          }, 300);
        } else {
          // 没有指定歌名，随机推荐一首歌直接播放
          setTimeout(() => {
            openMusicPlayer();
            autoPlayRandomSong();
          }, 300);
        }
      } else if (intentResult.intent === 'game') {
        setTimeout(() => {
          openGame();
          showToast('🎮 小动物快跑！加油哦~');
        }, 300);
      } else if (intentResult.intent === 'unknown' && text.length <= 20 && !text.includes('？') && !text.includes('?')) {
        // 短句且不含问号，可能是意图表达，用AI辅助识别
        tryDetectIntentByAI(text);
      }

      // —— 关键词检测：惩罚优先于加分 ——
      const moodResult = checkMoodKeywords(text);
      let penaltyApplied = null;

      if (moodResult) {
        penaltyApplied = applyPenalty(moodResult);

        // 记录负面事件到记忆
        addMemory('lastNegativeEvent', {
          keyword: moodResult.matchedKeyword,
          level: moodResult.level,
          date: new Date().toISOString()
        });

        // 显示惩罚反馈
        if (penaltyApplied.isExtreme) {
          showBreakupToast(penaltyApplied.oldStageName);
        } else if (penaltyApplied.isPersuading) {
          // 挽留阶段：不显示归零toast，显示挽留提示
          showPersuadeToast(penaltyApplied);
        } else {
          showPenaltyToast(penaltyApplied);
        }
        updateProgressionUI();
      } else {
        // 正常加分（二次复合期间使用复合专属行为）
        const action = isReconciling() ? 'reconcileChat' : 'chat';
        const result = addAffection(action);
        if (result) {
          showAffectionGain(result.points, result.message);
          if (result.stageUp) {
            setTimeout(() => showStageUp(result.newStage.name), 500);
          }
          updateProgressionUI();
        }
        // 正常互动时，重置挽留警告计数（用户回心转意了）
        const p = getProgression();
        if (p.breakupWarnings > 0) {
          p.breakupWarnings = 0;
          saveProgression(p);
        }
        // 发送消息获得金币
        addCoins(2, '发送消息');
      }

      // 确保有会话
      if (!currentSessionId) {
        createSession();
      }

      const session = getCurrentSession();

      // 添加用户消息到会话
      session.messages.push({ role: 'user', content: text });
      session.updatedAt = Date.now();

      // 更新标题
      if (session.messages.length === 1) {
        updateSessionTitle(text);
      }

      // 渲染用户消息
      renderMessages();
      messageInput.value = '';

      // 显示加载
      const loadingMsg = document.createElement('div');
      loadingMsg.className = 'message ai loading';
      loadingMsg.textContent = '嗯...';
      chatContainer.appendChild(loadingMsg);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      // 构建意图上下文后缀
      let intentContext = '';
      if (intentResult.intent === 'music') {
        intentContext = '\n\n【系统提示】用户刚表达了听歌的意图，系统已自动搜索并播放歌曲（如用户指定了歌名则播放指定歌曲，否则随机推荐一首）。请自然地回应，比如"好，已经帮你放好了~"，语气温柔。';
      } else if (intentResult.intent === 'game') {
        intentContext = '\n\n【系统提示】用户刚表达了玩游戏的意图，系统已自动打开游戏窗口。请自然地回应，表示你看着他玩/陪他玩，语气轻松鼓励。';
      }

      // 挽留上下文：用户说分手/离婚但处于挽留阶段
      if (penaltyApplied && penaltyApplied.isPersuading) {
        if (penaltyApplied.persuadeRound === 1) {
          intentContext += '\n\n【系统提示·挽留】用户刚说了分手/离婚相关的话，这是第一次挽留。你需要挽留，但态度要平和，不要恳求或卑微。平静地表达不想分开，问问是什么问题，比如"我不想分手，我们有什么问题可以好好说。"保持自尊和理性。';
        } else {
          intentContext += '\n\n【系统提示·挽留】用户又一次说了分手/离婚，这是第二次挽留。仍然要挽留，态度认真但不卑微。比如"你确定想好了吗？我是不想走的。"如果用户再说第三次，你才会接受。';
        }
      }

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: 'glm-4-flash',
            messages: [
              { role: 'system', content: buildSystemPrompt() + intentContext },
              // 滑动窗口：只保留最近 20 轮对话（40 条），防止上下文过长导致人设丢失
              ...session.messages.slice(-40).map(m => ({ role: m.role, content: m.content }))
            ],
            stream: false
          })
        });

        const data = await response.json();
        loadingMsg.remove();

        if (data.choices && data.choices[0]) {
          const aiContent = data.choices[0].message.content;
          const currentSession = getCurrentSession();
          if (currentSession) {
            currentSession.messages.push({ role: 'assistant', content: aiContent });

            saveSessions();
            renderMessages();

          }
        } else {
          loadingMsg.textContent = '嗯...出了点问题';
          loadingMsg.classList.remove('loading');
        }
      } catch (error) {
        loadingMsg.remove();
        const errMsg = document.createElement('div');
        errMsg.className = 'message ai';
        errMsg.textContent = '网络出了点问题，嗯...再试一次？';
        chatContainer.appendChild(errMsg);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        console.error('API Error:', error);
      }

    function addCoins(amount, source) {
      const coins = getCoins();
      coins.amount += amount;
      coins.lastUpdate = Date.now();
      saveCoins(coins);
      const today = new Date().toDateString();
      const incomeData = localStorage.getItem(INCOME_KEY);
      let income = { date: today, amount: 0 };
      if (incomeData) {
        income = JSON.parse(incomeData);
        if (income.date !== today) income = { date: today, amount: 0 };
      }
      income.amount += amount;
      localStorage.setItem(INCOME_KEY, JSON.stringify(income));
      const logs = JSON.parse(localStorage.getItem('cyber_coin_logs') || '[]');
      logs.unshift({ amount, source, time: new Date().toISOString() });
      if (logs.length > 100) logs.pop();
      localStorage.setItem('cyber_coin_logs', JSON.stringify(logs));
      return coins.amount;
    }

          const song = data.result.songs[0]; // 播放第一首
          renderMusicList(data.result.songs);
          showToast(`🎵 找到《${song.name}》- ${song.artists[0].name}，马上播放~`);
          setTimeout(() => {
            playMusic(song.id, song.name, song.artists[0].name);
          }, 500);
        } else {
          list.innerHTML = '<div class="music-empty">未找到《' + escapeHtml(songName) + '》，换个关键词试试~</div>';
          showToast('😅 没找到这首歌，试试其他歌名吧~');
        }
      } catch (error) {
        list.innerHTML = '<div class="music-empty">搜索失败，请手动搜索试试吧~</div>';
        showToast('❌ 搜索出了点小问题');
      }
    }

    function togglePlay() {
      if (!currentMusic) return;
      if (isPlaying) {
        audioPlayer.pause(); isPlaying = false;
        document.getElementById('playBtn').textContent = '▶';
        document.querySelector('.music-player-bar .cover')?.classList.remove('playing');
        pauseMusicRomance();
      } else {
        audioPlayer.play(); isPlaying = true;
        document.getElementById('playBtn').textContent = '⏸';
        document.querySelector('.music-player-bar .cover')?.classList.add('playing');
        startMusicRomance();
      }
      updateMusicListUI();
      updateMusicCardStatus(currentMusic.id, isPlaying);
    }

    function stopMusic() {
      const stoppedMusicId = currentMusic ? currentMusic.id : null;
      audioPlayer.pause(); audioPlayer.currentTime = 0;
      isPlaying = false; currentMusic = null;
      document.getElementById('musicPlayerBar').style.display = 'none';
      document.querySelector('.music-player-bar .cover')?.classList.remove('playing');
      updateMusicListUI();
      if (stoppedMusicId) updateMusicCardStatus(stoppedMusicId, false);
      stopMusicRomance();
    }

    // 音乐浪漫特效
    let musicEffectInterval = null;
    let musicHeartsEl = null;
    let starEffectInterval = null;

    function startMusicRomance() {
      if (musicEffectInterval) return;
      // 添加背景光晕
      if (!musicHeartsEl) {
        musicHeartsEl = document.createElement('div');
        musicHeartsEl.className = 'music-hearts';
        document.body.appendChild(musicHeartsEl);
      }
      musicHeartsEl.style.display = 'block';
      // 创建飘落效果层
      const overlay = document.createElement('div');
      overlay.className = 'music-romantic-overlay';
      overlay.id = 'musicRomanticOverlay';
      document.body.appendChild(overlay);
      // 爱心飘落
      const hearts = ['💕', '💗', '💖', '💓', '💝', '❤️', '🩷'];
      musicEffectInterval = setInterval(() => {
        if (!isPlaying) return;
        const note = document.createElement('div');
        note.className = 'music-note note-active';
        note.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        note.style.left = Math.random() * 100 + '%';
        note.style.fontSize = (18 + Math.random() * 10) + 'px';
        note.style.animationDuration = '8s';
        overlay.appendChild(note);
        setTimeout(() => note.remove(), 9000);
      }, 600);
      // 星星闪烁
      starEffectInterval = setInterval(() => {
        if (!isPlaying) return;
        const star = document.createElement('div');
        star.className = 'music-star';
        star.textContent = '⭐';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 50 + '%';
        star.style.animationDelay = Math.random() * 2 + 's';
        overlay.appendChild(star);
        setTimeout(() => star.remove(), 5000);
      }, 1000);
    }

    function pauseMusicRomance() {
      if (musicEffectInterval) {
        clearInterval(musicEffectInterval);
        musicEffectInterval = null;
      }
      if (starEffectInterval) {
        clearInterval(starEffectInterval);
        starEffectInterval = null;
      }
      if (musicHeartsEl) {
        musicHeartsEl.style.display = 'none';
      }
    }

    function stopMusicRomance() {
      pauseMusicRomance();
      const overlay = document.getElementById('musicRomanticOverlay');
      if (overlay) overlay.remove();
    }

    function updateMusicListUI() {
      const items = document.querySelectorAll('.music-item');
      items.forEach(item => {
        const playIcon = item.querySelector('.play-icon');
        if (currentMusic && item.onclick && item.onclick.toString().includes(currentMusic.id)) {
          item.classList.add('playing');
          if (playIcon) playIcon.textContent = isPlaying ? '⏸' : '▶';
        } else {
          item.classList.remove('playing');
          if (playIcon) playIcon.textContent = '▶';
        }
      });
    }

    async function sendMusicCardMessage(songId, songName, artistName) {
      if (!currentSessionId) createSession();
      const session = getCurrentSession();
      session.messages.push({ role: 'user', type: 'music', music: { id: songId, name: songName, artist: artistName, isPlaying: true } });
      session.updatedAt = Date.now();
      if (session.messages.length === 1) updateSessionTitle(`🎵 ${songName}`);
      renderMessages();
      chatContainer.scrollTop = chatContainer.scrollHeight;
      const loadingMsg = document.createElement('div');
      loadingMsg.className = 'message ai loading';
      loadingMsg.textContent = '嗯...';
      chatContainer.appendChild(loadingMsg);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
          body: JSON.stringify({
            model: 'glm-4-flash',
            messages: [
              { role: 'system', content: buildSystemPrompt() + `\n\n用户正在和你一起听歌，当前播放的是《${songName}》- ${artistName}。请用温柔内敛的方式回应，可以简单分享对这首歌的感受，或者只是安静地陪伴。` },
              ...session.messages.slice(-40).map(m => ({ role: m.role, content: m.type === 'music' ? `我们一起听《${m.music.name}》吧~` : (m.content || '') }))
            ],
            stream: false
          })
        });
        const data = await response.json();
        loadingMsg.remove();
        if (data.choices && data.choices[0]) {
          const currentSession = getCurrentSession();
          if (currentSession) {
            currentSession.messages.push({ role: 'assistant', content: data.choices[0].message.content });
            currentSession.updatedAt = Date.now();
            saveSessions();
            renderMessages();
          }
        }
      } catch (error) {
        loadingMsg.remove();
        console.error('Music API Error:', error);
      }
    }

    audioPlayer.addEventListener('ended', () => {
      isPlaying = false;
      document.getElementById('playBtn').textContent = '▶';
      updateMusicListUI();
      if (currentMusic) updateMusicCardStatus(currentMusic.id, false);
    });

    function toggleMusicCard(songId) {
      if (currentMusic && currentMusic.id === parseInt(songId)) {
        togglePlay();
        updateMusicCardStatus(songId, isPlaying);
      } else {
        const session = getCurrentSession();
        if (session) {
          const musicMsg = session.messages.find(m => m.type === 'music' && m.music && m.music.id === parseInt(songId));
          if (musicMsg) playMusic(parseInt(songId), musicMsg.music.name, musicMsg.music.artist);
        }
      }
    }

    function stopMusicCard(songId) {
      if (currentMusic && currentMusic.id === parseInt(songId)) stopMusic();
      updateMusicCardStatus(songId, false);
    }

    function updateMusicCardStatus(songId, playing) {
      const session = getCurrentSession();
      if (!session) return;
      session.messages.forEach(m => {
        if (m.type === 'music' && m.music && m.music.id === parseInt(songId)) m.music.isPlaying = playing;
      });
      saveSessions();
      _lastRenderedSessionId = null; // force re-render
      renderMessages();
    }

    // ===== 心情记录功能 =====
    function openGame() {
      const { ipcRenderer } = require('electron');
      ipcRenderer.send('open-game');
    }

    // ===== 心情记录功能 =====
    const MOOD_KEY = 'cyber_mood_diary';
    const moodConfig = {
      happy:   { emoji: '😊', label: '开心' },
      neutral: { emoji: '😐', label: '平和' },
      sad:     { emoji: '😭', label: '不开心' }
    };

    function showMoodToast(text) {
      const toast = document.getElementById('moodToast');
      toast.textContent = text;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function saveMood(mood) {
      const logs = JSON.parse(localStorage.getItem(MOOD_KEY) || '[]');
      const now = new Date();
      const localTime = now.toLocaleString('zh-CN', { hour12: false });
      const cfg = moodConfig[mood] || {};
      logs.unshift({
        mood,
        emoji: cfg.emoji || '😐',
        label: cfg.label || '',
        time: localTime,
        ts: now.getTime(),
        content: '',
      });
      if (logs.length > 200) logs.splice(200);
      localStorage.setItem(MOOD_KEY, JSON.stringify(logs));
    }

    async function generateMoodMessage(mood) {
      const cfg = moodConfig[mood];
      const profile = getUserProfile();
      const aiName = profile.aiName || '沈砚之';

      // 获取上下文
      const context = buildMoodContext(mood);

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: 'glm-4-flash',
            messages: [
              { role: 'system', content: `你现在是${aiName}。用户刚记录了心情，请以${aiName}温柔内敛的风格，用简短的话语给予关心和支持。语气低沉温柔，话不多但真诚，符合他共情力强、默默陪伴的性格。句末可加"嗯"、"好"等语气词。不要超过20字。` },
              { role: 'user', content: context }
            ],
            stream: false
          })
        });

        const data = await response.json();
        if (data.choices && data.choices[0]) {
          showMoodToast(data.choices[0].message.content);
        } else {
          showMoodToast(`${cfg.emoji} 记录成功啦~`);
        }
      } catch (error) {
        const fallback = {
          happy: '开心记录成功！继续保持呀~ ✨',
          neutral: '平和记录成功～享受当下吧~ 🌿',
          sad: '记录成功，抱抱你~ 💕'
        };
        showMoodToast(fallback[mood]);
      }
    }

    function buildMoodContext(currentMood) {
      const moodData = JSON.parse(localStorage.getItem(MOOD_KEY) || '[]');
      const recentMoods = moodData.slice(0, 7);

      const chatData = JSON.parse(localStorage.getItem('cyber_chat_sessions') || '{"sessions":[]}');
      const recentSessions = chatData.sessions.slice(0, 3);

      let context = `用户刚记录了【${moodConfig[currentMood].label}】心情。\n\n`;

      // 最近话题
      if (recentSessions.length > 0) {
        context += '【最近的对话话题】\n';
        recentSessions.forEach((s, i) => {
          if (s.title && s.title !== '新的对话') {
            context += `${i + 1}. ${s.title}\n`;
          }
        });
      }

      // 最近心情趋势
      if (recentMoods.length > 0) {
        const moodCounts = { happy: 0, neutral: 0, sad: 0 };
        recentMoods.forEach(m => moodCounts[m.mood] = (moodCounts[m.mood] || 0) + 1);
        context += `\n【最近心情】😊${moodCounts.happy}次 😐${moodCounts.neutral}次 😭${moodCounts.sad}次`;
      }

      context += '\n\n请生成一句贴合情境的暖心回复！';
      return context;
    }

    document.querySelectorAll('.mood-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const mood = btn.dataset.mood;
        saveMood(mood);
        generateMoodMessage(mood);
        
        // 心情记录增加好感度
        const result = addAffection('chat');
        if (result) {
          showAffectionGain(result.points, result.message);
          updateProgressionUI();
        }
        // 记录心情获得金币
        addCoins(5, '记录心情');
      });
    });

    // ===== 好感度系统 =====
    function updateProgressionUI() {
      const p = getProgression();
      const stage = getCurrentStage(p.affection);
      const progress = getStageProgress(p.affection);
      
      const fill = document.getElementById('progressionFill');
      const stageEl = document.getElementById('progressionStage');
      const pointsEl = document.getElementById('progressionPoints');
      
      fill.style.width = progress + '%';
      fill.style.backgroundColor = stage.color;

      // 阶段名 + 复合标记
      let stageText = stage.name;
      if (p.isReconciling) {
        stageText += '<span class="reconcile-badge">复合中</span>';
      }
      stageEl.innerHTML = stageText;
      pointsEl.textContent = p.affection;
    }

    function showAffectionGain(points, message) {
      const toast = document.getElementById('affectionToast');
      toast.textContent = `💕 +${points} ${message}`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function showPenaltyToast(result) {
      const toast = document.getElementById('penaltyToast');
      toast.textContent = `💔 ${result.penalty} "${result.matchedKeyword}"`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);

      // 阶段下降提示
      if (result.stageDown) {
        setTimeout(() => {
          const downToast = document.getElementById('stageDownToast');
          const textEl = document.getElementById('stageDownText');
          const subEl = document.getElementById('stageDownSub');
          textEl.textContent = `🌧️ 关系退回到 ${result.newStageName}`;
          subEl.textContent = `从 ${result.oldStageName} 降了下来...`;
          downToast.classList.add('show');
          setTimeout(() => downToast.classList.remove('show'), 3000);
        }, 600);
      }
    }

    function showBreakupToast(fromStageName) {
      const toast = document.getElementById('breakupToast');
      const titleEl = document.getElementById('breakupTitle');
      const subEl = document.getElementById('breakupSub');
      const p = getProgression();

      titleEl.textContent = '关系归零';
      subEl.innerHTML = `从「${fromStageName}」回到了原点<br>如果你想重新开始，${p.breakupCount > 0 ? '这次请认真一点' : '我还在这里'}`;

      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function showPersuadeToast(penaltyResult) {
      const p = getProgression();
      const round = penaltyResult.persuadeRound;
      const toast = document.getElementById('breakupToast');
      const titleEl = document.getElementById('breakupTitle');
      const subEl = document.getElementById('breakupSub');

      if (round === 1) {
        titleEl.textContent = '💔 不想分开';
        subEl.innerHTML = `好感度 -${Math.abs(penaltyResult.penalty)}<br>我们有什么问题可以好好说`;
      } else {
        titleEl.textContent = '💔 你确定吗';
        subEl.innerHTML = `好感度 -${Math.abs(penaltyResult.penalty)}<br>我是不想走的`;
      }

      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function showStageUp(stageName) {
      const toast = document.getElementById('stageUpToast');
      const textEl = document.getElementById('stageUpText');
      const subEl = document.getElementById('stageUpSub');
      
      // 检测是否从复合状态升级
      let subText = '我们的关系更进一步了';
      if (isReconciling()) {
        subText = '我愿意...再相信你一次';
      }
      
      textEl.textContent = `🎉 升级到 ${stageName}！`;
      subEl.textContent = subText;
      
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ===== 换肤 =====
    const THEME_KEY = 'cyber_theme';

    function applyInlineIconColors(isDark) {
      // 将所有内联 style 中写死 #c03050 的 mask icon 动态切换颜色
      document.querySelectorAll('[style]').forEach(el => {
        const s = el.style;
        if (isDark) {
          if (s.backgroundColor === 'rgb(192, 48, 80)' || s.backgroundColor === '#c03050') {
            el.style.backgroundColor = '#b89840';
            el.dataset.themeIconChanged = '1';
          }
        } else {
          if (el.dataset.themeIconChanged) {
            el.style.backgroundColor = '#c03050';
            delete el.dataset.themeIconChanged;
          }
        }
      });
    }

    function applyBgImage(isDark) {
      document.getElementById('bgImg').src = isDark ? 'bg1.png' : 'bg.png';
    }

    function toggleTheme() {
      const isDark = document.body.classList.toggle('theme-dark');
      localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
      document.getElementById('themeToggleBtn').title = isDark ? '切换粉色风格' : '切换黑金风格';
      document.getElementById('themeToggleBtn').querySelector('.theme-icon').textContent = isDark ? '🌸' : '🌙';
      applyInlineIconColors(isDark);
      applyBgImage(isDark);
    }

    function initTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      if (saved === 'dark') {
        document.body.classList.add('theme-dark');
        document.getElementById('themeToggleBtn').title = '切换粉色风格';
        document.getElementById('themeToggleBtn').querySelector('.theme-icon').textContent = '🌸';
        requestAnimationFrame(() => {
          applyInlineIconColors(true);
          applyBgImage(true);
        });
      }
    }

    // ===== 初始化 =====
    // 设置顶部昵称
    function updateHeaderName() {
      const profile = getUserProfile();
      const aiName = profile.aiName || '沈砚之';
      document.getElementById('headerLeft').textContent = aiName;
    }
    initTheme();
    updateHeaderName();
    updateProgressionUI();

    loadSessions();
    renderMessages();
    messageInput.focus();

    // 默认折叠会话列表
    toggleSessionPanel();

  </script>
</body>
</html>
